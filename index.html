const Card = ({ children, style={} }) => (
  <div style={{ background:C.panel, border:`1px solid ${C.border}`, borderRadius:16, padding:18, ...style }}>
    {children}
  </div>
);
const Badge = ({ children, color, bg }) => (
  <span style={{ background:bg, color, borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:700 }}>{children}</span>
);
const Btn = ({ children, onClick, variant="primary", full, small, style={} }) => (
  <button onClick={onClick} style={{
    width:full?"100%":"auto", padding:small?"8px 14px":"12px 20px",
    borderRadius:10, fontSize:small?12:14, fontWeight:700, fontFamily:"inherit", cursor:"pointer", border:"none",
    background:variant==="primary"?C.green:variant==="gold"?C.gold:variant==="red"?C.red:variant==="ghost"?"transparent":C.panel,
    color:variant==="primary"||variant==="gold"||variant==="red"?C.white:variant==="ghost"?C.muted:C.green,
    ...(variant==="outline"?{border:`1.5px solid ${C.green}`,background:"transparent",color:C.green}:{}),
    ...(variant==="ghost"?{border:`1px solid ${C.border}`}:{}),
    ...style,
  }}>{children}</button>
);
const Divider = () => <div style={{ height:1, background:C.border, margin:"14px 0" }} />;
const SLabel = ({ children }) => (
  <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1.5, marginBottom:10 }}>{children}</div>
);

// ─── MÓDULO CAMPO ─────────────────────────────────────────────────────────────
function ModuloCampo() {
  const [campoSel, setCampoSel] = useState(CAMPOS[0]);
  const [etapaSel, setEtapaSel] = useState(campoSel.etapaActual);
  const etapas = FENOLOGIA[campoSel.cultivo]||[];
  const etapa  = etapas[etapaSel];

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        {CAMPOS.map(c => (
          <button key={c.id} onClick={() => { setCampoSel(c); setEtapaSel(c.etapaActual); }} style={{
            flex:1, background: campoSel.id===c.id?C.green:C.panel,
            color: campoSel.id===c.id?C.white:C.muted,
            border:`1px solid ${campoSel.id===c.id?C.green:C.border}`,
            borderRadius:20, padding:"7px 12px", fontSize:12, cursor:"pointer", fontFamily:"inherit",
          }}>{c.icon} {c.nombre.split(" ").slice(-1)[0]}</button>
        ))}
        <button style={{ background:"transparent", color:C.green, border:`1px dashed ${C.green}`,
          borderRadius:20, padding:"7px 12px", fontSize:12, cursor:"pointer", fontFamily:"inherit" }}>+</button>
      </div>

      <Card style={{ marginBottom:16, borderLeft:`4px solid ${C.green}` }}>
        <div style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
          <span style={{ fontSize:40 }}>{campoSel.icon}</span>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:17, fontWeight:700, color:C.earth }}>{campoSel.nombre}</div>
            <div style={{ fontSize:12, color:C.muted }}>📍 {campoSel.comuna}, {campoSel.region}</div>
            <div style={{ display:"flex", gap:16, marginTop:10, flexWrap:"wrap" }}>
              {[
                { l:"Variedad", v:campoSel.variedad },
                { l:"Superficie", v:`${campoSel.ha} ha` },
                { l:"Plantación", v:campoSel.anoPlantacion },
                { l:"Riego", v:campoSel.riego },
              ].map((d,i) => (
                <div key={i}>
                  <div style={{ fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:1 }}>{d.l}</div>
                  <div style={{ fontSize:13, fontWeight:600, color:C.earth, marginTop:1 }}>{d.v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </Card>

      <SLabel>🌿 Fenología · {campoSel.cultivoLabel}</SLabel>
      <div style={{ display:"flex", gap:4, marginBottom:16, overflowX:"auto", paddingBottom:4 }}>
        {etapas.map((e,i) => (
          <div key={i} onClick={() => setEtapaSel(i)} style={{
            flex:"0 0 auto", textAlign:"center", cursor:"pointer",
            padding:"8px 6px", borderRadius:12, minWidth:58,
            background: etapaSel===i?C.gold:i<campoSel.etapaActual?C.greenPale:C.panel,
            border:`2px solid ${etapaSel===i?C.gold:i===campoSel.etapaActual?C.green:C.border}`,
          }}>
            <div style={{ fontSize:18 }}>{e.icon}</div>
            <div style={{ fontSize:9, color:etapaSel===i?C.gold:C.muted, fontWeight:etapaSel===i?700:400, marginTop:4, lineHeight:1.3 }}>{e.nombre}</div>
          </div>
        ))}
      </div>

      {etapa && (
        <Card style={{ background: etapaSel===campoSel.etapaActual?C.goldPale:C.bg,
          border:`1.5px solid ${etapaSel===campoSel.etapaActual?C.gold+"55":C.border}` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontSize:15, fontWeight:700, color:C.earth }}>{etapa.icon} {etapa.nombre} · {etapa.meses}</div>
            {etapaSel===campoSel.etapaActual && <Badge color={C.gold} bg={C.goldPale+"aa"}>Etapa actual</Badge>}
          </div>
          {etapa.tareas.map((t,i) => (
            <div key={i} style={{ display:"flex", gap:10, alignItems:"flex-start",
              padding:"8px 0", borderBottom:i<etapa.tareas.length-1?`1px solid ${C.border}`:"none" }}>
              <div style={{ width:18, height:18, borderRadius:5, border:`2px solid ${C.border}`, flexShrink:0, marginTop:1 }} />
              <span style={{ fontSize:13, color:C.text, lineHeight:1.5 }}>{t}</span>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

            <div>
              <div style={{ fontSize:14, fontWeight:700, color:C.earth }}>{h.diag}</div>
              <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>🌿 {h.cultivo} · {h.fecha}</div>
            </div>
            <Badge color={h.estado==="Tratado"?C.green:C.red} bg={h.estado==="Tratado"?C.greenPale:C.redPale}>{h.estado}</Badge>
          </div>
          <div style={{ marginTop:10, height:4, background:C.border, borderRadius:2 }}>
            <div style={{ height:"100%", width:`${h.confianza}%`, background:`linear-gradient(90deg,${C.green},${C.greenLight})`, borderRadius:2 }} />
          </div>
          <div style={{ fontSize:11, color:C.muted, marginTop:4 }}>{h.confianza}% confianza IA</div>
        </Card>
      ))}
    </div>
  );
}

// ─── MÓDULO MERCADO ───────────────────────────────────────────────────────────
function ModuloMercado() {
  const [prodSel, setProdSel] = useState("ciruela");
  const m = MERCADO_DATA[prodSel];

  return (
    <div>
      <div style={{ background:C.goldPale, border:`1px solid ${C.gold}44`, borderRadius:12,
        padding:"10px 14px", marginBottom:16, fontSize:13, color:C.earthMid, lineHeight:1.6 }}>
        💡 Los precios son <strong>orientativos</strong> para planificar la temporada de venta. En producción conectamos datos en tiempo real de <strong>ODEPA y ProChile</strong>.
      </div>

      {/* Selector producto */}
      <div style={{ display:"flex", gap:8, marginBottom:16, overflowX:"auto" }}>
        {Object.entries(MERCADO_DATA).map(([k,v])=>(
          <button key={k} onClick={()=>setProdSel(k)} style={{
            background: prodSel===k?v.color:C.panel, color: prodSel===k?C.white:C.muted,
            border:`1px solid ${prodSel===k?v.color:C.border}`,
            borderRadius:20, padding:"7px 14px", fontSize:13,
            cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap",
          }}>{v.icon} {k.charAt(0).toUpperCase()+k.slice(1)}</button>
        ))}
      </div>

      {/* Precio */}
      <Card style={{ borderLeft:`5px solid ${m.color}`, marginBottom:14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div>
            <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1 }}>Precio internacional FOB</div>
            <div style={{ fontSize:32, fontWeight:700, color:C.earth, marginTop:4 }}>${m.precio} <span style={{ fontSize:13, color:C.muted }}>USD/kg</span></div>
            <div style={{ fontSize:13, color:m.cambio>=0?C.green:C.red, marginTop:4 }}>
              {m.cambio>=0?"▲":"▼"} {Math.abs(m.cambio)}% vs semana anterior
            </div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:11, color:C.muted }}>Volumen exportado</div>
            <div style={{ fontSize:15, fontWeight:600, color:C.earth, marginTop:3 }}>{m.volumen}</div>
            <div style={{ fontSize:11, color:C.muted, marginTop:6 }}>Top comprador</div>
            <div style={{ fontSize:13, fontWeight:600, color:C.earth }}>{m.topComprador}</div>
          </div>
        </div>
      </Card>

      {/* Tendencia */}
      <Card style={{ marginBottom:14 }}>
        <div style={{ fontSize:12, color:C.muted, textTransform:"uppercase", letterSpacing:1.5, marginBottom:12 }}>📈 Tendencia de precio (USD/kg)</div>
        <ResponsiveContainer width="100%" height={120}>
          <LineChart data={m.tendencia}>
            <XAxis dataKey="m" tick={{ fill:C.muted, fontSize:11 }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill:C.muted, fontSize:11 }} axisLine={false} tickLine={false} domain={["auto","auto"]} />
            <Tooltip contentStyle={{ background:C.panel, border:`1px solid ${C.border}`, borderRadius:8, fontSize:12 }} />
            <Line type="monotone" dataKey="p" stroke={m.color} strokeWidth={3} dot={{ fill:m.color, r:4 }} />
          </LineChart>
        </ResponsiveContainer>
      </Card>

      {/* Mercados compradores */}
      <Card style={{ marginBottom:14 }}>
        <div style={{ fontSize:12, color:C.muted, textTransform:"uppercase", letterSpacing:1.5, marginBottom:14 }}>🌍 Mercados compradores activos</div>
        {m.mercados.map((mc,i)=>(
          <div key={i} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0",
            borderBottom:i<m.mercados.length-1?`1px solid ${C.border}`:"none" }}>
            <span style={{ fontSize:20 }}>{mc.flag}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, fontWeight:600, color:C.earth }}>{mc.pais}</div>
              <div style={{ height:5, borderRadius:3, marginTop:5,
                width:`${mc.demanda}%`, background:`linear-gradient(90deg,${m.color},${C.gold})` }} />
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:15, fontWeight:700, color:C.earth }}>${mc.precio}</div>
              <div style={{ fontSize:13, color:mc.tend==="↑"?C.green:mc.tend==="↓"?C.red:C.muted }}>{mc.tend}</div>
            </div>
          </div>
        ))}
      </Card>

      {/* Insight */}
      <div style={{ background:`linear-gradient(135deg,${C.greenPale},${C.goldPale})`,
        border:`1px solid ${C.gold}33`, borderRadius:14, padding:16 }}>
        <div style={{ fontSize:11, color:C.gold, textTransform:"uppercase", letterSpacing:1.5, marginBottom:6 }}>💡 Insight AgroIntel</div>
        <div style={{ fontSize:13, color:C.earth, lineHeight:1.7 }}>{m.insight}</div>
      </div>
    </div>
  );
}

// ─── MAIN APP UNIFICADA ───────────────────────────────────────────────────────
const NAV = [
  { id:"home",    icon:"🏠", label:"Inicio"   },
  { id:"campo",   icon:"🌿", label:"Cultivos"  },
  { id:"cuaderno",icon:"📋", label:"Cuaderno" },
  { id:"clima",   icon:"⛅", label:"Clima"    },
  { id:"plagas",  icon:"🔍", label:"Plagas"   },
];

const SECTION_TITLES = {
  home:"Inicio", campo:"Mis Cultivos", cuaderno:"Cuaderno SAG",
  clima:"Clima y Alertas", plagas:"Plagas", mercado:"Mercado",
};

function SurcoApp() {
  const [tab, setTab]       = useState("home");
  const [toast, setToast]   = useState(null);

  const showToast = msg => {
    setToast(msg);
    setTimeout(() => setToast(null), 3000);
  };

  const navTo = t => setTab(t);

  return (
    <div style={{ minHeight:"100vh", background:C.bg, fontFamily:"'Georgia', serif",
      color:C.text, maxWidth:480, margin:"0 auto", paddingBottom:80 }}>

      {/* TOAST */}
      {toast && (
        <div style={{ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)",
          background:C.green, color:C.white, padding:"12px 20px", borderRadius:12,
          fontSize:13, fontWeight:600, zIndex:999, whiteSpace:"nowrap",
          boxShadow:"0 4px 24px rgba(0,0,0,0.18)", pointerEvents:"none" }}>
          {toast}
        </div>
      )}

      {/* HEADER */}
      <div style={{ background:C.green, padding:"14px 20px",
        display:"flex", alignItems:"center", justifyContent:"space-between",
        position:"sticky", top:0, zIndex:50 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:22 }}>🌿</span>
          <div>
            <div style={{ color:C.white, fontWeight:700, fontSize:18, letterSpacing:0.5 }}>Surco</div>
            <div style={{ color:C.greenLight, fontSize:10, letterSpacing:2, textTransform:"uppercase" }}>
              {SECTION_TITLES[tab] || "Surco"}
            </div>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          {/* Botón mercado */}
          <button onClick={() => navTo("mercado")} style={{
            background:"rgba(255,255,255,0.15)", border:"none", color:C.white,
            borderRadius:20, padding:"5px 12px", fontSize:12, cursor:"pointer", fontFamily:"inherit",
          }}>📊 Mercado</button>
          <div style={{ background:"rgba(255,255,255,0.15)", borderRadius:20,
            padding:"5px 12px", fontSize:12, color:C.white }}>
            🚨 3
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{ padding:"20px 16px" }}>
        {tab==="home"     && <ModuloHome onNavCampo={()=>navTo("campo")} onNavClima={()=>navTo("clima")} onNavCuaderno={()=>navTo("cuaderno")} onNavPlagas={()=>navTo("plagas")} onNavMercado={()=>navTo("mercado")} />}
        {tab==="campo"    && <ModuloCampo />}
        {tab==="cuaderno" && <ModuloCuaderno />}
        {tab==="clima"    && <ModuloClima />}
        {tab==="plagas"   && <ModuloPlagas onToast={showToast} />}
        {tab==="mercado"  && <ModuloMercado />}
      </div>

      {/* BOTTOM NAV */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
        width:"100%", maxWidth:480, background:C.panel, borderTop:`1px solid ${C.border}`,
        display:"flex", justifyContent:"space-around", padding:"10px 0 16px", zIndex:100 }}>
        {NAV.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            display:"flex", flexDirection:"column", alignItems:"center", gap:3,
            background:"none", border:"none", cursor:"pointer", fontFamily:"inherit",
            color:tab===t.id?C.green:C.muted,
          }}>
            <span style={{ fontSize:20 }}>{t.icon}</span>
            <span style={{ fontSize:9, fontWeight:tab===t.id?700:400, textTransform:"uppercase", letterSpacing:.5 }}>{t.label}</span>
            {tab===t.id && <div style={{ width:4, height:4, borderRadius:"50%", background:C.green }} />}
          </button>
        ))}
      </div>
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(<SurcoApp />);
  </script>
</body>
</html>
